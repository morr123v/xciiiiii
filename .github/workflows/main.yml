name: Fedora Workstation GNOME + Tailscale + xRDP

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fedora-rdp:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
      options: --privileged

    env:
      TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
      USERNAME: runner
      PASSWORD: runner
      TAILSCALE_HOSTNAME: fedora-ws-${{ github.run_id }}

    steps:
      - uses: actions/checkout@v4

      - name: Create user and install sudo
        run: |
          dnf install -y sudo
          useradd -m ${USERNAME}
          echo "${USERNAME}:${PASSWORD}" | chpasswd
          echo "${USERNAME} ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/${USERNAME}

      - name: Install GNOME Desktop (Workstation) & xRDP
        run: |
          echo ">>> Installing Fedora Workstation environment..."
          dnf -y update
          dnf -y groupinstall "GNOME"
          dnf -y install xrdp
          usermod -aG xrdp ${USERNAME}

      - name: Start D-Bus & xRDP
        run: |
          dbus-daemon --system --fork
          export $(dbus-launch)
          /usr/sbin/xrdp-sesman &
          /usr/sbin/xrdp &
          sleep 2

      - name: Install and connect Tailscale
        run: |
          echo ">>> Installing Tailscale..."
          curl -fsSL https://tailscale.com/install.sh | sh
          tailscale up --authkey "${TAILSCALE_AUTHKEY}" --hostname "${TAILSCALE_HOSTNAME}"

      - name: Show RDP info & keep alive
        run: |
          TAILSCALE_IP=$(tailscale ip -4 | head -n1)

          echo "======================================"
          echo " FEDORA WORKSTATION RDP"
          echo "======================================"
          echo "USERNAME : ${USERNAME}"
          echo "PASSWORD : ${PASSWORD}"
          echo "RDP IP   : ${TAILSCALE_IP}"
          echo "Connect using any RDP client."
          echo "More methods: @MR_English2008 / https://t.me/ME2008_RDP"
          echo ">>> Keeping runner alive..."
          tail -f /dev/null
